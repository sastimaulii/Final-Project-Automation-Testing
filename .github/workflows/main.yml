name: Automation Hybrid Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Tambahkan ini agar Chrome stabil di server
      - name: Setup Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Run API Tests
        run: ./gradlew apiTest
        continue-on-error: true

      - name: Run Web UI Tests
        run: ./gradlew webTest
        continue-on-error: true # Tambah ini agar artifact tetap terupload jika gagal

      - name: Upload Cucumber Report
        uses: actions/upload-artifact@v4
        if: always() # WAJIB agar report muncul walau test fail
        with:
          name: cucumber-reports
          path: build/reports/cucumber/